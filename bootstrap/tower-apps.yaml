---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tower-apps
  namespace: argo
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: tower-ops
  destination:
    name: tower
    namespace: argo
  source:
    repoURL: https://github.com/SJoon99/tower-k8s.git
    targetRevision: ops
    path: apps
    helm:
      releaseName: tower-apps
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
