---
# TowerX/mobilex-style preset values for the ScaleX Repo POC.
# Base/framework repo: https://github.com/SJoon99/eecs-k8s.git

cluster:
  name: tower
  group: ops
  singleNode: false
  standalone: false
  nameservers:
    loadBalancer:
      ipv4: ""

# Keep the first Tower control-plane proof intentionally small.
# eecs-k8s expands this through its feature dependency graph.
features:
  - org.ulagbulag.io/bare-metal-provisioning/kiss
  - org.ulagbulag.io/git
  - org.ulagbulag.io/gitops
  - org.ulagbulag.io/multicluster/karmada

ingress:
  domainName: tower.scalex.local
  loadBalancerIPs:
    gitlab: 0.0.0.0
    ingress: 0.0.0.0
    ns1: 0.0.0.0
    ns2: 0.0.0.0

repo:
  baseUrl: https://github.com
  owner: SJoon99
  name: eecs-k8s
  revision: main

# This repo represents the Tower control-plane cluster itself.
tower:
  cluster: tower
  controlPlane: true
  domainName: scalex.local
  group: ops

# vCluster Kubernetes does not populate legacy service-account-token Secrets reliably
# and does not carry the same scheduling labels/taints as the physical SmartX nodes.
argoEvents:
  vclusterSafeScheduling: true

argoWorkflows:
  vclusterSafeScheduling: true
  legacyServiceAccountTokenSecrets:
    enabled: false

# Tower KISS API is exposed so PXE-installed nodes can call /new and /commission.
apiserver:
  externalBaseUrl: http://10.34.20.3:31388
  service:
    nodePort: 31388

assets:
  baseUrl: http://10.34.20.3:32582
  service:
    type: NodePort
    nodePort: 32582

# Keep DHCP/PXE silent by default. Enable during a controlled provisioning window.
dnsmasq:
  replicas: 0

bootstrapper:
  network:
    address:
      ipv4: 10.34.20.3
    seed:
      mode: dhcp
      match:
        name: en*
        macaddress: ""
      setName: ""
      auto:
        strategy: fastest-reachable
        timeoutSeconds: 90
        probeUrls:
          - http://mirror.kakao.com/ubuntu/
      static:
        address: ""
        prefix: ""
        gateway: ""
        nameservers: []

kiss:
  # vCluster does not define the SmartX-specific PriorityClasses used on physical clusters.
  priorityClassName: ""
  workflowPriorityClassName: ""
  # The OpenARK KISS operator still stamps generated box-commission Jobs with
  # k8s-cluster-critical, so Tower must provide that PriorityClass explicitly.
  priorityClasses:
    create: true
    items:
      - name: k8s-cluster-critical
        value: 1000000000
        globalDefault: false
        description: Tower POC compatibility PriorityClass for OpenARK KISS Jobs.
        preemptionPolicy: PreemptLowerPriority
  # Use the Tower KISS apiserver NodePort for later commission submit paths.
  submitBaseUrl: http://10.34.20.3:31388
  # Tower POC does not need out-of-band power control during commissioning.
  # Leaving IPMI enabled on these boxes requires target-side containerd/nerdctl
  # before Kubernetes has been installed, which blocks commissioning.
  power:
    intelAmt:
      enabled: false
    ipmi:
      enabled: false
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  assets:
    proxy:
      enabled: true
    repo:
      ubuntu_24_04:
        baseUrl: http://mirror.kakao.com/ubuntu-releases/24.04
  apt:
    mirror:
      uri: http://mirror.kakao.com/ubuntu
  auth:
    ssh:
      key:
        # Do not commit the private key. Populate through a runtime Secret/values overlay before commissioning.
        private: ""
        public: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIM3SyWiIy+xPovBrSO6JsbTVaVWV+KIX6yrapYdWsrYs kiss@node4"
  os:
    dist: ubuntu
    version: "24.04"
    revision: "4"
    channel: release
    kernel: stable
  group:
    defaultRole: GenericWorker
    enableDefaultCluster: false
    enforceAnsibleControlPlanes: false
    forceReset: false
    forceResetOS: false
    resetStorage: false

network:
  interface:
    mtu: 9000
  ipv4:
    dhcp:
      gateway: "10.34.20.3"
      duration: 7d
      range:
        begin: 10.33.201.151
        end: 10.33.201.200
      serviceRoutes:
        enabled: true
    gateway: 10.47.255.254
    subnet: 10.32.0.0/12
  nameservers:
    ns1: 1.1.1.1
    ns2: 1.0.0.1

pxeEdge:
  namespace: tower-pxe-edge
  destination:
    name: node4-host
  hostNetwork: true
  priorityClassName: k8s-cluster-critical
  nodeSelector:
    node-role.kubernetes.io/control-plane: ""
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-role.kubernetes.io/kiss
                operator: In
                values:
                  - ControlPlane
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
