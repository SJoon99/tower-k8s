---
serviceAccount:
  name: tekton-ci-runner
  automountServiceAccountToken: false

rbac:
  name: tekton-ci-runner
  rules: []

resourceQuota:
  name: tower-ci
  hard:
    pods: "20"
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    persistentvolumeclaims: "10"
    requests.storage: 100Gi

limitRange:
  name: tower-ci
  container:
    default:
      cpu: "2"
      memory: 4Gi
    defaultRequest:
      cpu: 100m
      memory: 128Mi

networkPolicy:
  name: tower-ci-deny-ingress

workspace:
  persistentVolumeClaim:
    enabled: true
    name: source-workspace
    storageClassName: ""
    accessModes:
      - ReadWriteMany
    size: 10Gi

harbor:
  credentialsSecretName: harbor-builder
