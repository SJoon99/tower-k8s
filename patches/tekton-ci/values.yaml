---
serviceAccount:
  name: tekton-ci-runner
  automountServiceAccountToken: false

rbac:
  name: tekton-ci-runner
  rules: []

resourceQuota:
  name: tower-ci
  hard:
    pods: "20"
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    persistentvolumeclaims: "10"
    requests.storage: 100Gi

limitRange:
  name: tower-ci
  container:
    default:
      cpu: "2"
      memory: 4Gi
    defaultRequest:
      cpu: 100m
      memory: 128Mi

networkPolicy:
  name: tower-ci-deny-ingress

workspace:
  persistentVolumeClaim:
    enabled: true
    name: source-workspace
    storageClassName: "rook-ceph-filesystem-hot"
    accessModes:
      - ReadWriteMany
    size: 10Gi

ci:
  enabled: true
  registry:
    host: 10.34.25.18
    repositoryPrefix: tower-ci
    insecure: true
    credentialsSecretName: harbor-builder

promotion:
  enabled: true
  federation:
    repoURL: https://github.com/SJoon99/scalex-federation.git
    baseBranch: main
    githubRepository: SJoon99/scalex-federation
  github:
    credentialsSecretName: federation-promotion-github-app
    appIDKey: appID
    installationIDKey: installationID
    privateKeyKey: privateKey
