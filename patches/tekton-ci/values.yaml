---
serviceAccount:
  name: tekton-ci-runner
  automountServiceAccountToken: false

rbac:
  name: tekton-ci-runner
  rules: []

resourceQuota:
  name: tower-ci
  hard:
    pods: "20"
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    persistentvolumeclaims: "10"
    requests.storage: 100Gi

limitRange:
  name: tower-ci
  container:
    default:
      cpu: "2"
      memory: 4Gi
    defaultRequest:
      cpu: 100m
      memory: 128Mi

networkPolicy:
  name: tower-ci-deny-ingress

workspace:
  persistentVolumeClaim:
    enabled: true
    name: source-workspace
    storageClassName: "rook-ceph-filesystem-hot"
    accessModes:
      - ReadWriteMany
    size: 10Gi

ci:
  enabled: true
  registry:
    host: 10.34.25.18
    repositoryPrefix: tower-ci
    insecure: true
    credentialsSecretName: harbor-builder

promotion:
  enabled: true
  federation:
    repoURL: https://github.com/SJoon99/scalex-federation.git
    baseBranch: main
    githubRepository: SJoon99/scalex-federation
  github:
    credentialsSecretName: federation-promotion-github-app
    appIDKey: appID
    installationIDKey: installationID
    privateKeyKey: privateKey

githubWebhook:
  enabled: true
  names:
    serviceAccount: tekton-ci-listener
    eventListener: child-build-github
    triggerBinding: child-build-github
    triggerTemplate: child-build-github
    ingressNetworkPolicy: tekton-ci-listener-ingress
  secret:
    # Runtime-managed HMAC key; the Secret value is intentionally not in Git.
    name: github-webhook-secret
    key: secretToken
  repository:
    fullName: BellTigerLee/temp-poc
    branchRef: refs/heads/main
  pipeline:
    name: child-build
    runnerServiceAccount: tekton-ci-runner
    childName: temp-poc
    chartPath: chart
    buildTargets: >-
      [{"name":"dataset-ingest","valuesKey":"datasetIngest","context":".","dockerfile":"images/dataset-ingest/Dockerfile"},{"name":"batch-analyzer","valuesKey":"batchAnalyzer","context":".","dockerfile":"images/batch-analyzer/Dockerfile"},{"name":"report-generator","valuesKey":"reportGenerator","context":".","dockerfile":"images/report-generator/Dockerfile"}]
    timeout: 1h
    workspace:
      storageClassName: rook-ceph-block-hot
      accessModes:
        - ReadWriteOnce
      size: 5Gi
