---
# ScaleX POC runs Argo CD inside a vCluster whose virtual nodes do not carry
# the KISS node-role labels expected by the SmartX production defaults.
controller:
  affinity: {}

redis:
  affinity: {}

redisSecretInit:
  # The vCluster bootstrap chart already created the Redis secret; disabling
  # this hook avoids a duplicate Job stuck on SmartX/KISS node affinity.
  enabled: false
  affinity: {}

server:
  affinity: {}

repoServer:
  affinity: {}

applicationSet:
  affinity: {}

notifications:
  affinity: {}
