---
# Expose the Tower Argo CD UI through the host cluster load balancer.
controller:
  # Tower uses one controller for a small, fixed set of destinations. Disable
  # alpha dynamic sharding so every newly created Application is reconciled.
  dynamicClusterDistribution: false

server:
  service:
    type: LoadBalancer

# Enable the built-in admin account for the lab-only Tower Argo UI.
configs:
  cm:
    admin.enabled: true

# The redis init hook completed once but can leave self-managed Argo sync stuck.
redisSecretInit:
  enabled: false
