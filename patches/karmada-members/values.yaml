---
karmada:
  version: v1.18.1
  kubeconfigSecret:
    name: karmada-kubeconfig
    key: kubeconfig
  clusterNamespace: karmada-cluster

argoDestination:
  enabled: true
  namespace: argo
  secretName: cluster-karmada
  name: karmada
  server: https://karmada-apiserver.karmada-system.svc.cluster.local:5443

job:
  image: alpine/k8s:1.34.0@sha256:b5f6edfeac5279f3e182d938d1ffecb62f7c980756ac4b6b66d7f0d566782f77
  backoffLimit: 1

members:
  - name: b
    argoNamespace: argo
    argoSecret: cluster-b
    provider: scalex-poc
    region: tower-node4
    labels:
      scalex.io/site: b
      scalex.io/role: child
      scalex.io/topology: baremetal
  - name: c
    argoNamespace: argo
    argoSecret: cluster-c
    provider: scalex-poc
    region: tower-node4
    labels:
      scalex.io/site: c
      scalex.io/role: child
      scalex.io/topology: baremetal
