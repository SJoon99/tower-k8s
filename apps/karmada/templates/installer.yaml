---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: karmada-helm-installer
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/name: karmada-helm-installer
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: karmada-helm-installer
  labels:
    app.kubernetes.io/name: karmada-helm-installer
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: karmada-helm-installer
    namespace: {{ .Release.Namespace | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: karmada-helm-values
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/name: karmada-helm-installer
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
data:
  values.yaml: |-
{{ toYaml .Values | nindent 4 }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: karmada-helm-install
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/name: karmada-helm-installer
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: karmada-helm-installer
        app.kubernetes.io/instance: {{ .Release.Name | quote }}
    spec:
      restartPolicy: Never
      serviceAccountName: karmada-helm-installer
      containers:
        - name: helm
          image: alpine/helm:3.18.6
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
          args:
            - |
              helm repo add karmada-charts https://raw.githubusercontent.com/karmada-io/karmada/master/charts
              helm repo update karmada-charts
              helm upgrade --install karmada karmada-charts/karmada \
                --version {{ .Chart.AppVersion | quote }} \
                --namespace {{ .Release.Namespace | quote }} \
                --create-namespace \
                --values /config/values.yaml \
                --wait \
                --timeout 15m
          volumeMounts:
            - name: values
              mountPath: /config
              readOnly: true
      volumes:
        - name: values
          configMap:
            name: karmada-helm-values
